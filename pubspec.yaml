name: sharap
description: SNU 서울대학교 생활 앱 - 과제/달력/식당/지도

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 네트워크
  dio: ^5.4.3
  html: ^0.15.4

  # 로컬 저장소
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # 지도
  flutter_naver_map: ^1.4.4
  geolocator: ^13.0.1
  flutter_compass: ^0.8.1  # 나침반 (가속도계+자기계 융합, 기울임 보정 heading)

  # 달력 UI
  table_calendar: ^3.1.2

  # 알림 + 분석 + 크래시 리포트
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  flutter_local_notifications: ^17.2.2

  # 음성 인식
  speech_to_text: ^7.3.0

  # 홈 화면 위젯
  home_widget: ^0.7.0

  # 인앱 WebView (mySNU 시간표 로그인)
  webview_flutter: ^4.8.0

  # 파일 선택 (ICS 가져오기)
  file_picker: ^8.0.0

  # 유틸
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  xml: ^6.5.0

  # 권한 (마이크 등 — 권한 상태 구분 + 설정 딥링크)
  permission_handler: ^12.0.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
    - assets/marker_restaurant.png
    - assets/marker_cafe.png
    - assets/marker_building.png
    - assets/marker_convenience.png
