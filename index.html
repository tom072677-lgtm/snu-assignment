<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울대 과제 알림</title>

  <link rel="manifest" href="app.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <<div id="weatherInfo">
  <img id="weatherIcon" src="" alt="날씨 아이콘" />
  <p id="weatherText">날씨 불러오는 중...</p>
</div>
    <header class="app-header">
      <h1>서울대 과제 알림</h1>
      <p class="subtitle">과제를 추가하고 마감기한별로 관리해보자</p>
    </header>

    <main>
      <section class="input-section">
        <form id="taskForm">
          <div class="input-group">
            <label for="taskInput">과제 이름</label>
            <input
              type="text"
              id="taskInput"
              placeholder="예: 교육학 발표 자료 만들기"
              required
            />
          </div>

          <div class="input-group">
            <label for="dueDateInput">마감 날짜와 시간</label>
            <input
              type="datetime-local"
              id="dueDateInput"
              step="60"
              required
            />
          </div>

          <button type="submit" id="addBtn">과제 추가</button>
        </form>
      </section>

      <section class="summary-section">
    

        <div class="summary-card">
          <h2>진행 중</h2>
          <p id="activeCount">0</p>
        </div>

      
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2>과제 목록</h2>
          <button type="button" id="sortBtn">마감순 정렬</button>
          <button type="button" id="testAlertBtn">알림 테스트</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <p id="emptyMessage" class="empty-message">
          아직 등록된 과제가 없습니다.
        </p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => {
            console.log("Service Worker 등록 성공");
          })
          .catch((error) => {
            console.log("Service Worker 등록 실패:", error);
          });
      });
    }
  </script>
</body>
</html>
